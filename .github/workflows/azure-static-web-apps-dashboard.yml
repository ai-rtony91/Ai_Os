name: Azure Static Web Apps Dashboard

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: azure-static-web-apps-dashboard
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ALGOTRADEZ_AIOS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/dashboard
          api_location: ""
          output_location: dist
          app_build_command: npm run build
