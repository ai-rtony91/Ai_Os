name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required governance files
        shell: bash
        run: |
          set -euo pipefail
          test -f SECURITY.md
          test -f COMPLIANCE_BASELINE.md
          test -f LICENSE
          test -f .github/dependabot.yml
          test -f docs/security/threat-model.md
          test -f docs/security/approval-model.md
          test -f docs/security/audit-logging.md
          test -f docs/security/secret-prevention.md
          test -f docs/security/repo-hygiene.md

      - name: Check workflow syntax
        shell: bash
        run: |
          set -euo pipefail
          test -f .github/workflows/ci.yml
          grep -q "name: CI" .github/workflows/ci.yml
          grep -q "runs-on: ubuntu-latest" .github/workflows/ci.yml

      - name: Check placeholder identity strings in source files
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE "youremail@example.com|your-github-email" \
            --include="*.py" \
            --include="*.ps1" \
            --include="*.json" \
            --include="*.yml" \
            --include="*.yaml" \
            --exclude-dir=.git \
            --exclude-dir=.github \
            .; then
            echo "Placeholder identity string found in source/config files."
            exit 1
          fi

      - name: Check obvious secret assignments in source files
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInP "\b(api_key|apikey|secret|token|password|broker)\b[[:space:]]*[:=]\s*['\"](?!BLOCKED|NONE|MISSING|EXAMPLE|placeholder|changeme|your_|demo_)[^'\"]+['\"]" \
            --include="*.py" \
            --include="*.ps1" \
            --include="*.json" \
            --include="*.yml" \
            --include="*.yaml" \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude-dir=docs \
            .; then
            echo "Potential secret-like assignment found in source/config files."
            exit 1
          fi

      - name: Python syntax check for core source
        shell: bash
        run: |
          set -euo pipefail
          paths=""
          for dir in aios agent services apps scripts automation; do
            if test -d "$dir"; then
              paths="$paths $dir"
            fi
          done

          if test -n "$paths"; then
            python -m compileall $paths
          else
            echo "No core Python source directories found."
          fi
